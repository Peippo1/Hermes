services:
  - type: web
    name: hermes-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: HERMES_USE_LIVE_AGENTS
        value: "false"
      - key: HERMES_MODEL
        value: gpt-4.1-mini
      - key: CORS_ORIGINS
        value: http://localhost:5173
